<!doctype html><html><body style="font-family:Arial;max-width:760px;margin:40px auto">
<h1>ShipScope</h1><p>Turn ideas into a ship-ready checklist.</p>
<textarea id=i style="width:100%;height:100px" placeholder="Your project idea"></textarea><br>
<button onclick="go()">Generate</button><pre id=o></pre>
<script>
async function go(){const idea=i.value.trim();if(!idea)return;o.textContent='...';const r=await fetch('/api/plan',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({idea})});const d=await r.json();o.textContent=`Scope: ${d.scope}\n\nMilestones:\n${d.milestones.map((x,n)=>`${n+1}. ${x}`).join('\n')}\n\nLaunch Checklist:\n- ${d.launchChecklist.join('\n- ')}\n\nRisks:\n- ${d.risks.join('\n- ')}`}
</script></body></html>
